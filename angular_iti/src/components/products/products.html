<div class="products-container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold mb-1">Our Products</h2>
      <p class="text-secondary mb-0">Browse our latest collection of premium devices.</p>
    </div>
  </div>

  <!-- Responsive Product Grid -->
  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    @for (product of products; track product.id) {
      <div class="col">
        <app-product-card 
          [product]="product"
          [isPurchased]="purchasedProductIds().has(product.id)"
          [isSelected]="selectedProductIds().has(product.id)"
          (buy)="onBuy($event)"
          (select)="onSelect($event)"
        ></app-product-card>
      </div>
    }
  </div>

  <!-- Bottom Summary Info (Sticky Bar) -->
  <div class="summary-bar mt-5 p-4 bg-light border rounded-4 shadow-sm d-flex flex-wrap justify-content-between align-items-center gap-3">
    <div class="d-flex align-items-center gap-4">
      <div>
        <div class="text-secondary small text-uppercase fw-semibold">Selected Items</div>
        <div class="h4 mb-0 fw-bold text-dark">{{ selectedCount() }} product(s)</div>
      </div>
      <div class="border-start ps-4">
        <div class="text-secondary small text-uppercase fw-semibold">Total Price</div>
        <div class="h4 mb-0 fw-extrabold text-primary">${{ totalPrice() }}</div>
      </div>
    </div>
    
    <div>
      <button 
        type="button" 
        class="btn btn-outline-danger px-4 py-2 fw-semibold"
        [disabled]="selectedCount() === 0 && totalPrice() === 0"
        (click)="resetCart()"
      >
        Clear All
      </button>
    </div>
  </div>
</div>
