<div class="container mt-4">
  @if (showNavbar()) {
    <header class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
      <div class="d-flex align-items-center gap-4">
        <a routerLink="/products" class="d-flex align-items-center text-decoration-none text-body">
          <span class="fs-3 fw-bold">
            ✨ Gadget<span class="text-primary">Store</span>
          </span>
        </a>
        <nav class="d-flex gap-3">
          <a routerLink="/products" routerLinkActive="text-primary fw-bold" [routerLinkActiveOptions]="{exact: true}" class="text-decoration-none text-secondary">Products</a>
          <a routerLink="/products/add" routerLinkActive="text-primary fw-bold" class="text-decoration-none text-secondary">Add Product</a>
        </nav>
      </div>
      <button 
        type="button" 
        class="btn btn-outline-secondary d-flex align-items-center gap-2 theme-toggle-btn px-3 py-2 fw-semibold"
        appThemeToggle
      >
        🌓 Mode Switch
      </button>
    </header>
  }

  <router-outlet></router-outlet>
</div>
